<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="Teleprompter">
  <defs>
    <linearGradient id="tp-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    <linearGradient id="tp-line-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff" stop-opacity="0" />
      <stop offset="50%" stop-color="#fff" stop-opacity="1" />
      <stop offset="100%" stop-color="#fff" stop-opacity="0" />
    </linearGradient>
    <mask id="tp-line-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="256" height="256">
      <rect width="256" height="256" fill="url(#tp-line-fade)" />
    </mask>
  </defs>

  <!-- Black rounded card -->
  <rect width="256" height="256" rx="56" fill="#0a0a0a" />

  <!-- Stack of fading text lines (scrolling-text idea) -->
  <g mask="url(#tp-line-mask)">
    <rect x="44"  y="60"  width="168" height="10" rx="5" fill="#fff" fill-opacity="0.35" />
    <rect x="44"  y="84"  width="120" height="10" rx="5" fill="#fff" fill-opacity="0.55" />
    <rect x="44"  y="108" width="148" height="10" rx="5" fill="#fff" fill-opacity="0.85" />
    <rect x="44"  y="160" width="132" height="10" rx="5" fill="#fff" fill-opacity="0.85" />
    <rect x="44"  y="184" width="168" height="10" rx="5" fill="#fff" fill-opacity="0.55" />
    <rect x="44"  y="208" width="100" height="10" rx="5" fill="#fff" fill-opacity="0.35" />
  </g>

  <!-- Center reader marker — gradient line + ▶ ◀ caps -->
  <line x1="36" y1="134" x2="220" y2="134" stroke="url(#tp-accent)" stroke-width="2" stroke-linecap="round" />
  <circle cx="36" cy="134" r="5" fill="url(#tp-accent)" />
  <circle cx="220" cy="134" r="5" fill="url(#tp-accent)" />
</svg>
