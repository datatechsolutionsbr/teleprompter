<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" fill="none" role="img" aria-label="Teleprompter">
  <defs>
    <linearGradient id="wm-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
  </defs>

  <!-- Logo glyph (compact version of logo.svg) -->
  <rect x="16" y="20" width="120" height="120" rx="28" fill="#0a0a0a" />
  <g transform="translate(16,20)">
    <rect x="20"  y="22"  width="80"  height="6"  rx="3" fill="#fff" fill-opacity="0.35" />
    <rect x="20"  y="36"  width="56"  height="6"  rx="3" fill="#fff" fill-opacity="0.55" />
    <rect x="20"  y="50"  width="70"  height="6"  rx="3" fill="#fff" fill-opacity="0.85" />
    <rect x="20"  y="76"  width="62"  height="6"  rx="3" fill="#fff" fill-opacity="0.85" />
    <rect x="20"  y="90"  width="80"  height="6"  rx="3" fill="#fff" fill-opacity="0.55" />
    <rect x="20"  y="104" width="46"  height="6"  rx="3" fill="#fff" fill-opacity="0.35" />
    <line x1="14" y1="63" x2="106" y2="63" stroke="url(#wm-accent)" stroke-width="2" stroke-linecap="round" />
    <circle cx="14" cy="63" r="3" fill="url(#wm-accent)" />
    <circle cx="106" cy="63" r="3" fill="url(#wm-accent)" />
  </g>

  <!-- Wordmark text -->
  <text x="160" y="100" font-family="ui-sans-serif, -apple-system, 'Inter', system-ui, sans-serif" font-size="56" font-weight="700" letter-spacing="-2" fill="#fff">teleprompter</text>
  <text x="160" y="130" font-family="ui-sans-serif, -apple-system, 'Inter', system-ui, sans-serif" font-size="14" font-weight="500" letter-spacing="0.5" fill="#a3a3a3">by datatech solutions</text>
</svg>
