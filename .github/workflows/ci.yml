name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run type-check
      - run: npm test
      - run: npm run build
      - name: Verify dist contents
        run: |
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts
